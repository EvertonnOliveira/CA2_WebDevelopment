<!DOCTYPE html>
<!--
  Shopping cart page
  Fetches cart items from GET /api/cart?session_id=xxx
  Allows removing items via DELETE /api/cart/:productId
  Proceed to checkout button navigates to checkout.html
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Irish Sponsorship Jobs</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── CART PAGE STYLES ───────────────────────────────────────── */

    /* Two-column layout: cart items on left, order summary on right.
       Switches to single column on mobile via media query. */
    .cart-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 2rem;
      align-items: start;
    }

    @media (max-width: 768px) {
      .cart-layout { grid-template-columns: 1fr; }
    }

    /* Individual cart item row */
    .cart-item {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
      transition: border-color var(--transition);
    }

    .cart-item:hover {
      border-color: var(--color-green);
    }

    .cart-item-info h3 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--color-white);
      margin-bottom: 4px;
    }

    .cart-item-info p {
      font-size: 0.85rem;
      color: var(--color-muted);
    }

    .cart-item-price {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--color-orange);
      white-space: nowrap;
    }

    /* Remove button — subtle red on hover */
    .btn-remove {
      background: transparent;
      border: 1px solid var(--color-border);
      color: var(--color-muted);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition);
      font-family: var(--font-body);
    }

    .btn-remove:hover {
      border-color: #e05252;
      color: #e05252;
      background: rgba(224, 82, 82, 0.08);
    }

    /* Order summary sidebar */
    .order-summary {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 1.5rem;
      position: sticky;
      top: 90px; /* stays visible while scrolling */
    }

    .order-summary h3 {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--color-white);
      margin-bottom: 1.25rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--color-border);
    }

    /* Summary line rows */
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: var(--color-muted);
      margin-bottom: 0.75rem;
    }

    /* Total row — larger and highlighted */
    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-white);
      padding-top: 1rem;
      border-top: 1px solid var(--color-border);
      margin-top: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .summary-total span:last-child {
      color: var(--color-orange);
    }

    /* Empty cart state */
    .empty-cart {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--color-muted);
    }

    .empty-cart .empty-icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 1rem;
    }

    .empty-cart h3 {
      font-family: var(--font-display);
      color: var(--color-white);
      margin-bottom: 0.5rem;
    }

    .loading-state {
      text-align: center;
      padding: 3rem;
      color: var(--color-muted);
    }
  </style>
</head>
<body>

  <header>
    <h1>Irish Sponsorship Jobs</h1>
    <nav>
      <a href="home.html">Home</a>
      <a href="jobs.html">Jobs</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact Us</a>
      <a href="cart.html" class="active">🛒 Cart</a>
    </nav>
  </header>

  <main>
    <h2 class="section-title">Your Cart</h2>
    <p class="section-subtitle">Review your selected services before checkout.</p>

    <!-- Cart layout: populated by JavaScript -->
    <div id="cartContainer">
      <div class="loading-state">Loading your cart...</div>
    </div>

  </main>

  <footer>
    <p>© 2026 Irish Sponsorship Jobs — Built for CCT College Dublin</p>
  </footer>

  <script>
/*
       cart.js (inline) — Loads and manages the shopping cart.

       Flow:
         1. Read session_id from localStorage
         2. Fetch cart items from GET /api/cart?session_id=xxx
         3. Render items with remove buttons and order summary
         4. Handle remove button clicks via DELETE /api/cart/:id
         5. Re-render after every change
 */

    /* Get session ID — must match the one used in services.html */
    function getSessionId() {
      return localStorage.getItem('session_id') || '';
    }

    const SESSION_ID = getSessionId();


    /* --- LOAD CART ---
       Fetches the current cart from the API and renders it. */
    async function loadCart() {
      const container = document.getElementById('cartContainer');

      if (!SESSION_ID) {
        renderEmptyCart(container);
        return;
      }

      try {
        const response = await fetch('/api/cart?session_id=' + SESSION_ID);
        if (!response.ok) throw new Error('Failed to load cart');

        const cart = await response.json();

        if (cart.items.length === 0) {
          renderEmptyCart(container);
        } else {
          renderCart(container, cart);
        }

      } catch (err) {
        container.innerHTML = `
          <p style="color:var(--color-error); text-align:center; padding:2rem;">
            ⚠️ Could not load cart. Make sure the server is running.
          </p>
        `;
      }
    }


    /* --- RENDER CART ---
       Builds the two-column layout with cart items and summary. */
    function renderCart(container, cart) {
      const itemsHTML = cart.items.map(item => `
        <div class="cart-item" id="item-${item.product_id}">
          <div class="cart-item-info">
            <h3>${item.product_name}</h3>
            <!-- Quantity shown so user knows how many they have -->
            <p>Qty: ${item.quantity} × €${parseFloat(item.product_price).toFixed(2)}</p>
          </div>
          <div style="display:flex; align-items:center; gap:1rem;">
            <span class="cart-item-price">€${parseFloat(item.line_total).toFixed(2)}</span>
            <!-- data-id used by removeItem() to know which product to delete -->
            <button class="btn-remove" onclick="removeItem(${item.product_id})">Remove</button>
          </div>
        </div>
      `).join('');

      container.innerHTML = `
        <div class="cart-layout">

          <!-- LEFT: cart items list -->
          <div id="cartItems">${itemsHTML}</div>

          <!-- RIGHT: order summary sidebar -->
          <div class="order-summary">
            <h3>Order Summary</h3>

            ${cart.items.map(item => `
              <div class="summary-row">
                <span>${item.product_name}</span>
                <span>€${parseFloat(item.line_total).toFixed(2)}</span>
              </div>
            `).join('')}

            <div class="summary-total">
              <span>Total</span>
              <span>€${cart.total}</span>
            </div>

            <!-- Proceed to checkout button -->
            <a href="checkout.html" class="btn btn-primary" style="text-decoration:none; display:block; text-align:center;">
              Proceed to Checkout
            </a>

            <!-- Continue shopping link -->
            <a href="services.html" style="display:block; text-align:center; margin-top:1rem; font-size:0.85rem; color:var(--color-muted); text-decoration:none;">
              ← Continue Shopping
            </a>
          </div>

        </div>
      `;
    }


    /* --- RENDER EMPTY CART ---
       Shown when the cart has no items. */
    function renderEmptyCart(container) {
      container.innerHTML = `
        <div class="empty-cart">
          <span class="empty-icon">🛒</span>
          <h3>Your cart is empty</h3>
          <p>Browse our services and add something to get started.</p>
          <a href="services.html" class="btn btn-primary" style="display:inline-flex; margin-top:1.5rem; width:auto; padding: 12px 32px;">
            Browse Services
          </a>
        </div>
      `;
    }


    /* --- REMOVE ITEM ---
       Sends DELETE /api/cart/:productId to remove the item from
       the MySQL cart_items table, then reloads the cart. */
    async function removeItem(productId) {
      try {
        const response = await fetch(
          '/api/cart/' + productId + '?session_id=' + SESSION_ID,
          { method: 'DELETE' }
        );

        if (!response.ok) throw new Error('Failed to remove item');

        /* Reload the cart to reflect the updated state */
        loadCart();

      } catch (err) {
        alert('Could not remove item. Please try again.');
        console.error('Remove error:', err);
      }
    }


    /* Load cart on page ready */
    loadCart();
  </script>

</body>
</html>
